<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epher - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        eBlack: '#111111',
                        ePanel: '#161616',
                        eCard: '#262626',
                        ePurple: '#6E54B4',
                        ePurpleMuted: '#4F407A',
                        eTextMain: '#E8DDF7',
                        eTextMuted: '#B8AECF',
                        eGreen: '#4ADE80',
                    },
                    borderRadius: {
                        'box': '1.5rem',
                        'btn': '1.25rem',
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">
    <div class="w-[430px] h-[932px] bg-eBlack text-eTextMain relative overflow-hidden flex flex-col font-sans ring-1 ring-white/10 shadow-2xl">
        
        <!-- Top App Bar -->
        <header class="bg-ePurple h-[100px] pt-[48px] px-5 flex items-center justify-between z-10 shrink-0">
            <div class="flex items-center gap-2">
                <i class="ph-fill ph-asterisk text-2xl text-white opacity-90 animate-pulse" style="animation-duration: 3s;"></i>
                <span class="font-bold text-xl tracking-tighter text-white uppercase mt-0.5">Epher</span>
            </div>
            <div class="flex items-center gap-4 text-white">
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/10 hover:bg-black/20 transition-colors">
                    <i class="ph ph-list text-xl"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/10 hover:bg-black/20 transition-colors">
                    <i class="ph ph-gear text-xl"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto no-scrollbar p-5 pb-24 flex flex-col gap-6">
            
            <!-- Identity Header -->
            <div class="flex flex-col items-center justify-center pt-8 pb-4 gap-2">
                <div class="w-16 h-16 rounded-full bg-eCard border-2 border-ePanel flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-br from-teal-500/20 to-transparent"></div>
                    <i class="ph ph-fingerprint text-3xl text-teal-400 opacity-80"></i>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase tracking-widest text-eTextMuted font-semibold mb-1">Local Identity</p>
                    <p class="text-lg font-medium text-white tracking-wide">cipher_wolf</p>
                </div>
            </div>

            <!-- Latest Room Hero Card -->
            <button class="w-full bg-eCard rounded-box p-6 flex flex-col relative overflow-hidden group text-left active:scale-[0.98] transition-transform">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-ePurple opacity-5 rounded-full blur-2xl group-hover:opacity-10 transition-opacity"></div>
                
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <span class="text-[10px] tracking-widest text-eTextMuted uppercase font-bold">Latest Room</span>
                    <i class="ph ph-arrow-up-right text-eTextMuted group-hover:text-white transition-colors text-xl"></i>
                </div>
                
                <h2 class="text-3xl font-bold text-white mb-1 relative z-10">Night Shift</h2>
                <p class="font-mono text-xs text-eTextMuted mb-6 relative z-10 border border-white/5 bg-black/20 self-start px-2 py-1 rounded">ID: 9X4-F2A</p>
                
                <div class="flex items-center gap-2 relative z-10">
                    <div class="w-2 h-2 rounded-full bg-eGreen shadow-[0_0_8px_rgba(74,222,128,0.5)]"></div>
                    <span class="text-xs font-semibold text-white uppercase tracking-wider">CONNECTED</span>
                </div>
            </button>

            <!-- Actions -->
            <div class="flex flex-col gap-3 mt-2">
                <a class="w-full bg-ePurple hover:bg-ePurple/90 active:bg-ePurpleMuted text-white rounded-btn h-14 font-semibold text-lg flex items-center justify-center gap-3 transition-colors shadow-lg shadow-ePurple/20" href="/create-room">
                    <i class="ph-bold ph-plus-circle text-xl"></i>
                    CREATE ROOM
                </a>
                <button class="w-full bg-ePanel border-2 border-eCard hover:border-ePurple/50 text-eTextMain rounded-btn h-14 font-semibold text-lg flex items-center justify-center gap-3 transition-colors">
                    <i class="ph-bold ph-key text-xl text-eTextMuted"></i>
                    JOIN ROOM
                </button>
            </div>

            <!-- Context Info -->
            <div class="mt-4 text-center">
                <p class="text-xs text-eTextMuted inline-flex items-center gap-2 bg-ePanel px-4 py-2 rounded-full">
                    <i class="ph-fill ph-hard-drives"></i>
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    4 ROOMS IN MEMORY</p>
            </div>

        </main>

        <!-- Bottom Status Strip -->
        <div class="absolute bottom-0 w-full h-[52px] bg-ePanel/90 backdrop-blur-md border-t border-white/5 flex items-center justify-center gap-3 z-20 pb-2">
            <div class="px-3 py-1 bg-black/40 rounded-full flex items-center gap-1.5 border border-white/5">
                <div class="w-1.5 h-1.5 bg-eGreen rounded-full"></div>
                <span class="text-[10px] uppercase font-bold text-eTextMuted tracking-wider">Connected</span>
            </div>
            <div class="px-3 py-1 bg-black/40 rounded-full flex items-center gap-1.5 border border-white/5">
                <i class="ph-fill ph-shield-check text-[#2DD4BF] text-xs"></i>
                <span class="text-[10px] uppercase font-bold text-eTextMuted tracking-wider">Verified</span>
            </div>
            <div class="px-3 py-1 bg-black/40 rounded-full flex items-center gap-1.5 border border-white/5">
                <i class="ph-fill ph-lock-key text-ePurple text-xs"></i>
                <span class="text-[10px] uppercase font-bold text-eTextMuted tracking-wider">Encrypted</span>
            </div>
        </div>

    </div>

</body></html>
